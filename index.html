<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicken Crash Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #0b1020;
      color: #fff;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px;
      background: linear-gradient(180deg, #0d1330, #08101f);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .brand {
      font-size: 22px;
      font-weight: bold;
    }
    .balance {
      background: #1a2447;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      color: #7ef29a;
      font-weight: bold;
    }
    .game-card {
      background: #101938;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 12px 24px rgba(0,0,0,.25);
    }
    .game-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: #b9c4ff;
      font-size: 14px;
    }
    .multiplier {
      text-align: center;
      font-size: 40px;
      font-weight: bold;
      color: #8cc8ff;
      margin: 10px 0 16px;
    }
    .road {
      position: relative;
      height: 320px;
      border-radius: 16px;
      overflow: hidden;
      background:
        linear-gradient(90deg, transparent 48%, rgba(255,255,255,.08) 49%, rgba(255,255,255,.08) 51%, transparent 52%),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.06) 0px,
          rgba(255,255,255,.06) 14px,
          transparent 14px,
          transparent 34px
        ),
        linear-gradient(180deg, #111d47, #0b1433);
    }
    .chicken {
      position: absolute;
      left: 28px;
      bottom: 22px;
      font-size: 54px;
      transition: bottom .1s linear, left .1s linear, transform .1s linear;
      z-index: 2;
    }
    .boom {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      background: rgba(255, 59, 48, .18);
      color: #ff8f8f;
      z-index: 3;
    }
    .markers {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .marker {
      position: absolute;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.16);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cdd7ff;
      font-size: 12px;
      background: rgba(255,255,255,.03);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .stat {
      background: #18244c;
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat span {
      display: block;
      color: #a8b3e6;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .stat strong {
      font-size: 22px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 15px 10px;
      font-family: inherit;
      font-size: 18px;
      cursor: pointer;
    }
    .start { background: #5b2cff; color: white; }
    .cash { background: #1d8cff; color: white; }
    .cash:disabled, .start:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .note {
      margin-top: 12px;
      color: #99a7de;
      font-size: 13px;
      line-height: 1.8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">🐔 Chicken Crash</div>
      <div class="balance">سکه: <span id="coinsTop">0</span></div>
    </div>

    <div class="game-card">
      <div class="game-head">
        <div>Demo Mode</div>
        <div>بدون پول واقعی</div>
      </div>

      <div class="multiplier" id="multiplier">1.00x</div>

      <div class="road" id="road">
        <div class="markers">
          <div class="marker" style="right: 26px; top: 28px;">1.20x</div>
          <div class="marker" style="right: 90px; top: 110px;">1.55x</div>
          <div class="marker" style="right: 34px; top: 200px;">1.95x</div>
        </div>
        <div class="chicken" id="chicken">🐔</div>
        <div class="boom" id="boom">باخت!</div>
      </div>

      <div class="stats">
        <div class="stat">
          <span>سکه</span>
          <strong id="coins">0</strong>
        </div>
        <div class="stat">
          <span>امتیاز</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>بهترین ضریب</span>
          <strong id="best">1.00x</strong>
        </div>
      </div>

      <div class="controls">
        <button class="start" id="startBtn">شروع</button>
        <button class="cash" id="cashBtn" disabled>توقف</button>
      </div>

      <div class="note">
        روی شروع بزن، ضریب بالا میره. قبل از باخت روی توقف بزن تا سکه و امتیاز بگیری.
      </div>
    </div>
  </div>

  <script>
    const multiplierEl = document.getElementById('multiplier');
    const coinsEl = document.getElementById('coins');
    const coinsTopEl = document.getElementById('coinsTop');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const startBtn = document.getElementById('startBtn');
    const cashBtn = document.getElementById('cashBtn');
    const chickenEl = document.getElementById('chicken');
    const boomEl = document.getElementById('boom');

    let coins = Number(localStorage.getItem('cc_coins') || 0);
    let score = Number(localStorage.getItem('cc_score') || 0);
    let best = Number(localStorage.getItem('cc_best') || 1);
    let currentMultiplier = 1;
    let interval = null;
    let crashAt = 0;
    let running = false;

    function save() {
      localStorage.setItem('cc_coins', coins);
      localStorage.setItem('cc_score', score);
      localStorage.setItem('cc_best', best);
    }

    function render() {
      coinsEl.textContent = coins;
      coinsTopEl.textContent = coins;
      scoreEl.textContent = score;
      bestEl.textContent = best.toFixed(2) + 'x';
      multiplierEl.textContent = currentMultiplier.toFixed(2) + 'x';
    }

    function resetChicken() {
      chickenEl.style.left = '28px';
      chickenEl.style.bottom = '22px';
      chickenEl.style.transform = 'scale(1)';
      boomEl.style.display = 'none';
    }

    function randomCrashPoint() {
      return 1.20 + Math.random() * 2.80;
    }

    function animateChicken(mult) {
      const progress = Math.min((mult - 1) / 2.5, 1);
      const left = 28 + progress * 190;
      const bottom = 22 + progress * 210;
      chickenEl.style.left = left + 'px';
      chickenEl.style.bottom = bottom + 'px';
      chickenEl.style.transform = 'scale(' + (1 + progress * 0.25) + ')';
    }

    function endRoundCrash() {
      clearInterval(interval);
      running = false;
      boomEl.style.display = 'flex';
      chickenEl.style.transform = 'scale(1.15)';
      startBtn.disabled = false;
      cashBtn.disabled = true;
      setTimeout(() => {
        currentMultiplier = 1;
        resetChicken();
        render();
      }, 1100);
    }

    function startRound() {
      if (running) return;
      running = true;
      currentMultiplier = 1;
      crashAt = randomCrashPoint();
      resetChicken();
      render();

      startBtn.disabled = true;
      cashBtn.disabled = false;

      interval = setInterval(() => {
        currentMultiplier += 0.03 + currentMultiplier * 0.01;
        animateChicken(currentMultiplier);
        render();

        if (currentMultiplier >= crashAt) {
          endRoundCrash();
        }
      }, 120);
    }

    function cashOut() {
      if (!running) return;

      clearInterval(interval);
      running = false;

      const earnedCoins = Math.floor(currentMultiplier * 10);
      const earnedScore = Math.floor(currentMultiplier * 5);

      coins += earnedCoins;
      score += earnedScore;
      if (currentMultiplier > best) best = currentMultiplier;

      save();
      render();

      startBtn.disabled = false;
      cashBtn.disabled = true;

      alert('بردی ✅\\nضریب: ' + currentMultiplier.toFixed(2) + 'x\\nسکه: +' + earnedCoins);
      currentMultiplier = 1;
      resetChicken();
      render();
    }

    startBtn.addEventListener('click', startRound);
    cashBtn.addEventListener('click', cashOut);

    render();
    resetChicken();
  </script>
</body>
</html>
